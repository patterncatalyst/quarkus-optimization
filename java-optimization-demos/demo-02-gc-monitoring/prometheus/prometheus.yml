global:
  scrape_interval:     5s
  scrape_timeout:      4s
  evaluation_interval: 5s
  external_labels:
    monitor: 'quarkus-jvm-gc-demo'

rule_files:
  - "/etc/prometheus/rules.yml"

scrape_configs:
  - job_name: 'quarkus-g1gc'
    metrics_path: '/q/metrics'
    static_configs:
      - targets: ['quarkus-app-g1gc:8080']
        labels:
          gc_type: 'G1GC'
          app: 'quarkus-gc-demo'
          framework: 'quarkus-3.33.1'

  - job_name: 'quarkus-zgc'
    metrics_path: '/q/metrics'
    static_configs:
      - targets: ['quarkus-app-zgc:8080']
        labels:
          gc_type: 'ZGC'
          app: 'quarkus-gc-demo'
          framework: 'quarkus-3.33.1'

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
