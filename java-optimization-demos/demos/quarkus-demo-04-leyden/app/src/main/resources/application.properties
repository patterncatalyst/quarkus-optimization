## ============================================================
## Demo 04: Quarkus + Project Leyden AOT Cache
## Quarkus 3.33.1 LTS / JDK 25 LTS
## ============================================================

quarkus.application.name=quarkus-leyden-demo
quarkus.http.port=8080

## ── THE KEY PROPERTY ──────────────────────────────────────────
## Enable Leyden AOT cache generation (Project Leyden, JDK 24+).
## Quarkus Maven plugin trains on @QuarkusIntegrationTest suite.
## Output: target/quarkus-app/app.aot
##
## Guide: quarkus.io/guides/aot
quarkus.package.jar.aot.enabled=true

## Training phase:
##   auto             (default) — uses @QuarkusIntegrationTest suite
##   build            — trains at build time (no tests needed, less optimal)
##   integration-tests — explicit (same as auto, stated clearly)
quarkus.package.jar.aot.phase=auto

## ── Health ────────────────────────────────────────────────────
## Used by the integration test during training run
quarkus.smallrye-health.root-path=/q/health

## ── Logging — keep quiet during training run ──────────────────
quarkus.log.level=WARN
quarkus.log.category."io.quarkus".level=INFO

## ── Dev mode ──────────────────────────────────────────────────
## AOT property is ignored in dev mode (live reload incompatible with fixed cache)
%dev.quarkus.package.jar.aot.enabled=false
%dev.quarkus.log.level=INFO

