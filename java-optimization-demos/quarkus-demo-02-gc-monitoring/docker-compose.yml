version: "3.9"

# ============================================================
# Demo 02 (Quarkus): GC Monitoring — Grafana LGTM Stack
#   Framework: Quarkus 3.33.1 LTS / Java 21
#
#   • Quarkus G1GC app  (port 8080) — OTLP traces + /q/metrics
#   • Quarkus ZGC app   (port 8081) — same app, different GC
#   • Grafana LGTM      (port 3000) — Grafana + Tempo + Loki
#   • Prometheus        (port 9090) — scrapes /q/metrics
# ============================================================

services:

  # ── Grafana LGTM — starts first ───────────────────────────
  grafana-lgtm:
    image: docker.io/grafana/otel-lgtm:0.8.1
    container_name: grafana-lgtm
    ports:
      - "3000:3000"
      - "4317:4317"
      - "4318:4318"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SECURITY_ADMIN_USER=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
    volumes:
      # Add external Prometheus datasource alongside otel-lgtm's built-in ones
      # Mounting a single file is additive — does NOT affect Tempo/Loki datasources
      - ./grafana/provisioning/datasources/external-prometheus.yml:/etc/grafana/provisioning/datasources/external-prometheus.yml:Z
    networks:
      - observability

  # ── Quarkus App — G1GC ────────────────────────────────────
  quarkus-app-g1gc:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: quarkus-app-g1gc
    ports:
      - "8080:8080"
    environment:
      GC_TYPE: g1gc
    mem_limit: 512m
    cpus: "1.0"
    networks:
      - observability
    depends_on:
      - grafana-lgtm

  # ── Quarkus App — ZGC ─────────────────────────────────────
  quarkus-app-zgc:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: quarkus-app-zgc
    ports:
      - "8081:8080"
    environment:
      GC_TYPE: zgc
      JAVA_OPTS: "-XX:ZCollectionInterval=5 -XX:ZUncommitDelay=60"
    mem_limit: 512m
    cpus: "1.0"
    networks:
      - observability
    depends_on:
      - grafana-lgtm

  # ── Prometheus — scrapes /q/metrics from both apps ────────
  # Starts immediately — retries scraping until apps come up
  prometheus:
    image: docker.io/prom/prometheus:v3.2.1
    container_name: prometheus
    user: root
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:Z
      - ./prometheus/rules.yml:/etc/prometheus/rules.yml:Z
    tmpfs:
      - /prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=2h"
    networks:
      - observability

networks:
  observability:
    driver: bridge
