# Grafana Tempo 2.7.x — minimal single-instance config
# Breaking change in 2.7: OTLP receivers default to localhost, not 0.0.0.0
# Must explicitly bind to 0.0.0.0 for container networking.

server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: "0.0.0.0:4317"
        http:
          endpoint: "0.0.0.0:4318"

ingester:
  max_block_duration: 5m

compactor:
  compaction:
    block_retention: 1h

storage:
  trace:
    backend: local
    local:
      path: /tmp/tempo/blocks
    wal:
      path: /tmp/tempo/wal
