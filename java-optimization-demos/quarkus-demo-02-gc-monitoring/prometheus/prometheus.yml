# Standalone Prometheus — scrapes /q/metrics from Quarkus apps
# Separate from otel-lgtm's internal Prometheus (which handles OTLP metrics)
# Prometheus will retry failed scrapes every 5s — no startup ordering needed

global:
  scrape_interval:     5s
  scrape_timeout:      4s
  evaluation_interval: 5s

rule_files:
  - "/etc/prometheus/rules.yml"

scrape_configs:
  - job_name: 'quarkus-g1gc'
    metrics_path: '/q/metrics'
    static_configs:
      - targets: ['quarkus-app-g1gc:8080']
        labels:
          gc_type: 'G1GC'
          framework: 'quarkus-3.33.1'

  - job_name: 'quarkus-zgc'
    metrics_path: '/q/metrics'
    static_configs:
      - targets: ['quarkus-app-zgc:8080']
        labels:
          gc_type: 'ZGC'
          framework: 'quarkus-3.33.1'
