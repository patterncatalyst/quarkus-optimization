## ============================================================
## Demo 02: GC Monitoring — Quarkus 3.33.1 LTS / Java 21
## Extension: quarkus-micrometer-opentelemetry (unified, preview)
## Telemetry backend: Grafana LGTM (Tempo + Prometheus + Grafana)
## ============================================================

quarkus.application.name=quarkus-gc-monitoring-demo
quarkus.http.port=8080

## ── quarkus-micrometer-opentelemetry (replaces registry-prometheus + opentelemetry separately) ──
## All Micrometer metrics AND OTel traces flow through the OTel SDK via OTLP.
## Guide: quarkus.io/guides/telemetry-micrometer-to-opentelemetry

## Enable JVM binders for GC pause, heap, thread metrics
quarkus.micrometer.binder.jvm=true
quarkus.micrometer.binder.system=true
quarkus.micrometer.binder.http-server.enabled=true

## GC pause histogram — needed for P50/P99 quantile queries
quarkus.micrometer.distribution.percentiles-histogram.jvm.gc.pause=true
quarkus.micrometer.distribution.percentiles.jvm.gc.pause=0.5,0.95,0.99

## ── OTel OTLP exporter → Grafana Tempo (replaces Jaeger) ─────────
## Single endpoint for traces AND metrics via OTLP gRPC
quarkus.otel.exporter.otlp.endpoint=http://tempo:4317
quarkus.otel.traces.sampler=always_on
quarkus.otel.service.name=${quarkus.application.name}

## Metrics also exported via OTLP (to Prometheus remote write or Grafana Mimir)
## For demo simplicity, Prometheus still scrapes /q/metrics as fallback
quarkus.otel.metrics.exporter=otlp

## ── Health (SmallRye Health) ───────────────────────────────
quarkus.smallrye-health.root-path=/q/health
quarkus.smallrye-health.ui.enable=true

## ── Dev mode ──────────────────────────────────────────────
%dev.quarkus.otel.exporter.otlp.endpoint=http://localhost:4317
%dev.quarkus.log.level=INFO
