apiVersion: 1
datasources:
  # Prometheus — JVM metrics from /q/metrics
  - name: Prometheus
    type: prometheus
    url: http://prometheus:9090
    access: proxy
    isDefault: true

  # Grafana Tempo — distributed traces from Quarkus OTel
  # Replaces Jaeger — search traces in Grafana → Explore → Tempo
  - name: Tempo
    type: tempo
    url: http://tempo:3200
    access: proxy
    jsonData:
      tracesToMetrics:
        datasourceUid: prometheus
      serviceMap:
        datasourceUid: prometheus
      search:
        hide: false
      nodeGraph:
        enabled: true
