# ------------------------------------------------------------------
# Site settings
# ------------------------------------------------------------------
title: Quarkus Optimization
description: >-
  Demos and reference material for optimizing Quarkus applications
  in containers and on Kubernetes / OpenShift.
author: patterncatalyst
url: "https://patterncatalyst.github.io"
baseurl: "/quarkus-optimization"

# ------------------------------------------------------------------
# Theme (remote theme — no gem install needed on GitHub Pages)
# ------------------------------------------------------------------
remote_theme: just-the-docs/just-the-docs

# ------------------------------------------------------------------
# Plugins (all on the GitHub Pages allowlist)
# ------------------------------------------------------------------
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-github-metadata

# ------------------------------------------------------------------
# Just the Docs options
# ------------------------------------------------------------------
color_scheme: light        # or "dark"
search_enabled: true
search:
  heading_level: 3
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s\-/]+/
  rel_url: true
  button: false

heading_anchors: true

# Links shown in the top-right of every page
aux_links:
  "View on GitHub":
    - "https://github.com/patterncatalyst/quarkus-optimization"
aux_links_new_tab: true

# Footer
footer_content: >-
  &copy; 2026 patterncatalyst. Content licensed per repository LICENSE.
  Built with <a href="https://just-the-docs.com">Just the Docs</a>.

back_to_top: true
back_to_top_text: "Back to top"

# Callout styles (use with {: .note }, {: .warning }, etc.)
callouts:
  note:
    title: Note
    color: blue
  warning:
    title: Warning
    color: yellow
  tip:
    title: Tip
    color: green

# ------------------------------------------------------------------
# Build behavior
# ------------------------------------------------------------------
markdown: kramdown
kramdown:
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: false

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - README-site.md
  - .bundle

# Make links to *.md resolve cleanly
permalink: pretty

# SEO
logo: "/assets/images/logo.png"   # optional — drop a file here if you want one
lang: en
